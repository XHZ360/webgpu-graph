packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@webgpu/types": ^0.1.66
  "@types/node": ^24
  typescript: ~6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
